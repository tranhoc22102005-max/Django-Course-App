<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid mt-5">
        <h1 class="text-center">Course Name: {{ course.name }}</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form action="{% url 'onlinecourse:submit' course.id %}" method="post">
                    {% csrf_token %}
                    {% for lesson in course.lesson_set.all %}
                        <div class="card mt-3">
                            <div class="card-header bg-info text-white"><h5>Lesson: {{ lesson.title }}</h5></div>
                            <div class="card-body">
                                {% for question in lesson.question_set.all %}
                                    <p><strong>{{ question.question_text }}</strong></p>
                                    {% for choice in question.choice_set.all %}
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="choice_{{ question.id }}" id="{{ choice.id }}" value="{{ choice.id }}">
                                            <label class="form-check-label" for="{{ choice.id }}">
                                                {{ choice.choice_text }}
                                            </label>
                                        </div>
                                    {% endfor %}
                                    <hr>
                                {% endfor %}
                            </div>
                        </div>
                    {% endfor %}
                    <button class="btn btn-success btn-lg btn-block mt-3 mb-5" type="submit">Submit Exam</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
